<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>注册 - 储能容量测算系统</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f5f5f5; }
        .container { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #28a745; color: white; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }
        .flash { color: red; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>用户注册</h2>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}
    <form method="post">
        <label>用户名</label>
        <input type="text" name="username" required>
        <label>密码</label>
        <input type="password" name="password" required>
        <button type="submit">注册</button>
    </form>
    <p style="text-align:center;">已有账号？ <a href="{{ url_for('login') }}">去登录</a></p>
</div>
</body>
</html>
