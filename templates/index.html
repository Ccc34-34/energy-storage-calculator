<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>储能容量测算系统</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2, h3 { color: #333; }
        h3 { border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 5px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .row > div { flex: 1; min-width: 180px; }
        .demand-table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        .demand-table th, .demand-table td { border: 1px solid #ccc; padding: 6px; text-align: center; }
        .demand-table input { width: 90%; margin: 0; }
        .remove-row-btn { background-color: #dc3545; color: white; border: none; border-radius: 3px; padding: 4px 8px; cursor: pointer; }
        .add-row-btn { background-color: #28a745; margin-top: 5px; }
        .success { color: green; }
        .error { color: red; }
        hr { margin: 20px 0; }
        .top-bar { text-align: right; margin-bottom: 20px; }
        .checkbox-group { display: flex; gap: 20px; margin-top: 10px; }
        .checkbox-group label { font-weight: normal; margin-top: 0; display: inline-flex; align-items: center; gap: 5px; }
        iframe { width: 100%; border: none; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        欢迎，{{ current_user.username }} | <a href="{{ url_for('logout') }}">退出登录</a>
    </div>
    <h2>储能容量测算（峰谷套利 · 多省份分季节时段）</h2>
    <form id="uploadForm" enctype="multipart/form-data">
        <label>上传 Excel 文件（必须包含负荷数据 A/B/C 列，需量数据 E/F 列可选，参数表 H/I 列）</label>
        <input type="file" name="file" accept=".xlsx, .xls" required>

        <hr>
        <h3>基本参数（留空则使用 Excel 内的值）</h3>
        <div class="row">
            <div>
                <label>省份选择</label>
                <select name="province">
                    <option value="安徽">安徽</option>
                    <option value="江苏">江苏</option>
                    <option value="浙江">浙江</option>
                    <option value="广东">广东</option>
                    <option value="上海">上海</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div><label>储能功率 (kW)</label><input type="number" name="p_nom" step="1" placeholder="如 125"></div>
            <div><label>储能容量 (kWh)</label><input type="number" name="e_nom" step="1" placeholder="如 261"></div>
        </div>
        <div class="row">
            <div><label>充放电效率 (%)</label><input type="number" name="eta" step="1" placeholder="如 92"></div>
            <div><label>年衰减率 (%)</label><input type="number" name="annual_decay" step="0.1" placeholder="0"></div>
        </div>

        <h3>SOC 参数</h3>
        <div class="row">
            <div><label>SOC下限 (%)</label><input type="number" name="soc_min" step="1" placeholder="0"></div>
            <div><label>SOC上限 (%)</label><input type="number" name="soc_max" step="1" placeholder="100"></div>
            <div><label>初始SOC (%)</label><input type="number" name="soc_init" step="1" placeholder="30"></div>
        </div>

        <h3>电网与限制参数</h3>
        <div class="row">
            <div>
                <label>限制方式</label>
                <select name="limit_type" id="limit_type">
                    <option value="">（使用Excel内值）</option>
                    <option value="容量">容量</option>
                    <option value="需量">需量</option>
                </select>
            </div>
            <div><label>变压器容量 (kVA)</label><input type="number" name="s_tr" step="1" placeholder="800"></div>
            <div><label>浮动系数</label><input type="number" name="float_coef" step="0.05" placeholder="0.9"></div>
        </div>

        <div id="demandTableDiv" style="display: none; margin-top: 15px;">
            <label>手动添加需量数据（若填写则优先使用，否则读取Excel）</label>
            <table class="demand-table" id="demandTable">
                <thead>
                    <tr><th>月份（支持多种格式）</th><th>需量 (kW)</th><th>操作</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <button type="button" id="addDemandRow" class="add-row-btn">+ 添加一行</button>
        </div>

        <h3>运行阈值</h3>
        <div class="row">
            <div><label>低功率阈值 (kW)</label><input type="number" name="low_th" step="1" placeholder="30"></div>
            <div><label>最小充电功率阈值 (kW)</label><input type="number" name="min_ch_power" step="1" placeholder="0"></div>
        </div>

        <h3>输出选项</h3>
        <div class="checkbox-group">
            <label>
                <input type="checkbox" name="run_simulation" checked> 储能测算（生成Excel结果）
            </label>
            <label>
                <input type="checkbox" name="generate_heatmap"> 负荷热力图（基于上传数据）
            </label>
        </div>

        <button type="submit">开始测算</button>
    </form>

    <div id="result" class="result"></div>
</div>

<script>
    // 动态需量表格
    const addBtn = document.getElementById('addDemandRow');
    if (addBtn) {
        addBtn.addEventListener('click', function() {
            const tbody = document.querySelector('#demandTable tbody');
            const newRow = tbody.insertRow();
            newRow.innerHTML = `
                <td><input type="text" name="demand_month[]" placeholder="如 202509 或 25年9月" style="width:100%"></td>
                <td><input type="number" name="demand_value[]" step="1" placeholder="需量 kW" style="width:100%"></td>
                <td><button type="button" class="remove-row-btn" onclick="this.closest('tr').remove()">删除</button></td>
            `;
        });
    }

    const limitSelect = document.getElementById('limit_type');
    const demandDiv = document.getElementById('demandTableDiv');
    if (limitSelect) {
        limitSelect.addEventListener('change', function() {
            demandDiv.style.display = (this.value === '需量') ? 'block' : 'none';
        });
    }

    // 表单提交
    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);

        // 收集需量表格数据
        const months = document.querySelectorAll('input[name="demand_month[]"]');
        const values = document.querySelectorAll('input[name="demand_value[]"]');
        const demandList = [];
        for (let i = 0; i < months.length; i++) {
            const m = months[i].value.trim();
            const v = values[i].value;
            if (m && v) demandList.push({ month: m, demand: parseFloat(v) });
        }
        if (demandList.length > 0) {
            formData.append('demand_json', JSON.stringify(demandList));
        }

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '<p>⏳ 处理中，请稍候...</p>';
        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            if (data.success) {
                // 清空结果区域
                resultDiv.innerHTML = '';
                // 显示储能测算结果（如果有）
                if (data.summary) {
                    let html = '<h3>计算结果汇总</h3><table border="1" cellpadding="5">';
                    for (const [k, v] of Object.entries(data.summary)) {
                        html += `<tr><th>${k}</th><td>${v}</td></tr>`;
                    }
                    html += '</table><br>';
                    const a = document.createElement('a');
                    a.href = data.download_url;
                    a.download = '储能模拟结果.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    html += '<p class="success">✅ 储能计算完成，Excel 文件已下载。</p>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<p>未选择储能测算，不生成 Excel 结果。</p>';
                }

                // 显示热力图（使用 iframe）
                if (data.heatmap_html) {
                    const heatmapTitle = document.createElement('h3');
                    heatmapTitle.textContent = '负荷热力图';
                    resultDiv.appendChild(heatmapTitle);
                    const iframe = document.createElement('iframe');
                    iframe.style.width = '100%';
                    iframe.style.height = '850px';
                    iframe.style.border = 'none';
                    iframe.srcdoc = data.heatmap_html;
                    resultDiv.appendChild(iframe);
                }
            } else {
                resultDiv.innerHTML = `<p class="error">❌ 错误：${data.error}</p>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p class="error">网络错误：${err.message}</p>`;
        }
    };
</script>
</body>
</html>
